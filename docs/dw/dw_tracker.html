<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ease-me Tracker — Desktop-Worker</title>
<style>
  :root { --bg:#0f1117; --card:#181b24; --mut:#8b93a7; --fg:#e7eaf0; --line:#262b38;
    --green:#2ecc71; --amber:#f1c40f; --red:#e74c3c; --blue:#4aa3ff; --gray:#5b6172; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.5 -apple-system,Segoe UI,Roboto,Arial,sans-serif; padding:24px; }
  h1 { font-size:20px; margin:0 0 4px; } h2 { font-size:15px; margin:22px 0 10px; color:#cfd6e6; }
  .sub { color:var(--mut); font-size:12px; margin-bottom:16px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:14px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; }
  .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; }
  .b-done{background:rgba(46,204,113,.18);color:var(--green);}
  .b-prog{background:rgba(241,196,15,.18);color:var(--amber);}
  .b-todo{background:rgba(91,97,114,.25);color:var(--mut);}
  .b-block{background:rgba(231,76,60,.18);color:var(--red);}
  .b-plan{background:rgba(74,163,255,.18);color:var(--blue);}
  .bar { height:10px; background:#222634; border-radius:6px; overflow:hidden; }
  .bar > i { display:block; height:100%; background:linear-gradient(90deg,var(--green),var(--blue)); }
  table { width:100%; border-collapse:collapse; font-size:12.5px; }
  th,td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--mut); font-weight:600; }
  code,.mono { font-family:Consolas,monospace; font-size:12px; }
  .row { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  ul { margin:6px 0; padding-left:18px; } li { margin:3px 0; }
  textarea { width:100%; background:#0c0e14; color:var(--fg); border:1px solid var(--line);
    border-radius:8px; padding:10px; font-family:Consolas,monospace; font-size:12px; }
  .pill { font-size:11px; color:var(--mut); }
</style>
</head>
<body>
<div id="app"></div>
<script>
const DATA = {
  project: "Desktop-Worker",
  northStar: "AI-control-ready Windows desktop automation (observe-plan-act-verify-log)",
  repo: "C:\\Desktop-Worker",
  workspace: "C:\\Desktop-Worker\\docs\\dw",
  updated: "2026-06-20",
  implementationAllowed: "YES (autonomous; auditor-gated)",
  validationLevel: "3 — unit (109 tests) + local runtime; UAC/input/screenshot/OCR/UIA (4) need user tests",
  cardsDone: 7, cardsTotal: 8,
  phases: [
    {id:"P1", name:"Local Control Foundation", status:"done"},
    {id:"P2", name:"Structured Action Loop", status:"done"},
    {id:"P3", name:"Elevated CLI Broker", status:"done"},
    {id:"P4", name:"Perception (OCR + UIA + wiring)", status:"done"},
    {id:"P5", name:"Browser & Desktop Workflows", status:"todo"},
    {id:"P6", name:"Multi-Agent Orchestration", status:"todo"},
    {id:"P7", name:"Production Hardening", status:"todo"},
  ],
  cards: [
    {id:"BOOTSTRAP-1", t:"Bootstrap + Phase 1 foundation", s:"done"},
    {id:"DW-LOOP-RECOVERY", t:"Retry / re-plan / safe-stop + time limit", s:"done"},
    {id:"DW-CLI-ELEVATE", t:"True per-command UAC elevation w/ captured output", s:"done"},
    {id:"DW-PERCEPTION-OCR", t:"OCR perception (Phase 4 start)", s:"done"},
    {id:"DW-PERCEPTION-UIA", t:"Windows UI Automation elements", s:"done"},
    {id:"DW-PERCEPTION-WIRE", t:"Wire Perceiver into the task loop", s:"done"},
    {id:"DW-INPUT-HARDEN", t:"Input reliability hardening (plan_hotkey/paste)", s:"done"},
    {id:"DW-PLANNER-AI", t:"Pluggable AI planner — BLOCKED on user model decision", s:"block", next:true},
  ],
  current: "none in progress",
  nextCard: "DW-PLANNER-AI — BLOCKED: needs a user decision on model/provider + API key (default rec: Claude/Anthropic SDK)",
  risks: [
    ["Broker shell=True runs cmd.exe strings","Medium","Gated by classify+approval+audit; no passthrough API"],
    ["'Elevated by default' not yet true per-command from non-admin","Medium","Broker reports actual token; DW-CLI-ELEVATE closes gap"],
    ["Real input not validated on live desktop","Medium","MANUAL-1; Null backend covers logic"],
    ["Risk classifier is heuristic","Medium","Deny-toward-caution; expand patterns; allow/deny lists later"],
  ],
  questions: [
    ["AI provider/model for planner","No","Default Claude; interface provider-agnostic"],
    ["UI tech (Phase 7)","No","Decide at Phase 7; CLI suffices"],
    ["Make initial git commit now","No","Left to user (no commit without ask)"],
  ],
  manual: [
    ["MANUAL-6","Install uiautomation + validate real UIA enumeration","non-blocking"],
    ["MANUAL-5","Install Tesseract + [ocr] and validate real OCR","non-blocking"],
    ["MANUAL-4","Validate real UAC elevation from a non-admin shell","non-blocking"],
    ["MANUAL-1","Validate real mouse/keyboard/drag on a live desktop","non-blocking"],
    ["MANUAL-2","Install [windows] extra for real screenshots (mss)","non-blocking"],
    ["MANUAL-3","Make the initial git commit","DONE"],
  ],
  lastFiles: [
    "src/desktop_worker/** (8 layers)","tests/** (71 tests)",
    "pyproject.toml, README.md, CLAUDE.md, .gitignore","docs/dw/** (ease-me workspace)"
  ],
  doNotTouch: ["docs/requirements.md (read-only source of truth)","artifacts/ (generated)",
    "*/backends.py Protocol signatures"],
  changelog: [
    "2026-06-20 DW-INPUT-HARDEN — pure plan_hotkey (reverse-release, no stuck modifier) + should_paste; long text pastes via Ctrl+V; Codex APPROVE, Northstar ALIGNED; 109 tests.",
    "2026-06-20 DW-PERCEPTION-WIRE — Perceiver wired into the loop; elements reach the audit; default path unchanged; Codex APPROVE, Northstar ALIGNED; 103 tests; Phase 4 complete.",
    "2026-06-20 DW-PERCEPTION-UIA — Windows UI Automation elements + UIA-preferred merge with OCR; Element.source now required; Codex APPROVE, Northstar ALIGNED; 101 tests; §7 preferred path.",
    "2026-06-20 DW-PERCEPTION-OCR — perception layer OCR path: Element schema (bounds/conf/source), pure data_to_elements parser, lazy Tesseract backend, Perceiver enriches frozen Observation; Codex APPROVE, Northstar ALIGNED; 95 tests; Phase 4 started.",
    "2026-06-20 DW-CLI-ELEVATE — real per-command UAC elevation (ShellExecuteEx runas + captured output); honesty invariant; Codex APPROVE (after security fixes), Northstar ALIGNED; 87 tests; Phase 3 complete.",
    "2026-06-20 DW-LOOP-RECOVERY — bounded retry/re-plan/safe-stop + time limit; Codex APPROVE, Northstar ALIGNED; 80 tests; Phase 2 complete.",
    "2026-06-20 BOOTSTRAP-1 — Python foundation across 8 layers; 71 tests; loop end-to-end; real observation; ease-me workspace + launchers."
  ],
  nextPrompt: "/ease-me continue  Repo: C:\\Desktop-Worker  Workspace: docs\\dw. Read dw_memory.md + dw_state.md. DW-PLANNER-AI is next but BLOCKED on the user's model/provider + API-key decision — confirm choice before implementing."
};

const SB = {done:["Done","b-done"],prog:["In progress","b-prog"],todo:["Not started","b-todo"],
  block:["Blocked","b-block"]};
function badge(s){const[a,b]=SB[s]||SB.todo;return `<span class="badge ${b}">${a}</span>`;}
const pct = Math.round(DATA.cardsDone/DATA.cardsTotal*100);

document.getElementById("app").innerHTML = `
  <h1>ease-me Tracker — ${DATA.project} <span class="badge b-plan">${DATA.implementationAllowed}</span></h1>
  <div class="sub">${DATA.northStar}</div>
  <div class="sub mono">repo ${DATA.repo} · workspace ${DATA.workspace} · updated ${DATA.updated}</div>

  <div class="card">
    <div class="row"><b>Progress</b><span class="pill">${DATA.cardsDone}/${DATA.cardsTotal} cards (${pct}%)</span></div>
    <div class="bar" style="margin-top:8px"><i style="width:${pct}%"></i></div>
    <div class="sub" style="margin-top:8px">Validation level: ${DATA.validationLevel}</div>
  </div>

  <div class="grid" style="margin-top:14px">
    <div class="card"><h2 style="margin-top:0">Phases</h2>
      ${DATA.phases.map(p=>`<div class="row" style="margin:6px 0"><span><code>${p.id}</code> ${p.name}</span>${badge(p.status)}</div>`).join("")}
    </div>
    <div class="card"><h2 style="margin-top:0">Backlog cards</h2>
      ${DATA.cards.map(c=>`<div class="row" style="margin:6px 0"><span>${c.next?"➡ ":""}<code>${c.id}</code> ${c.t}</span>${badge(c.s)}</div>`).join("")}
      <div class="sub" style="margin-top:10px">Current: ${DATA.current}<br>Next: <b>${DATA.nextCard}</b></div>
    </div>
  </div>

  <div class="grid" style="margin-top:14px">
    <div class="card"><h2 style="margin-top:0">Open risks</h2>
      <table><tr><th>Risk</th><th>Sev</th><th>Mitigation</th></tr>
      ${DATA.risks.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join("")}</table>
    </div>
    <div class="card"><h2 style="margin-top:0">Open questions</h2>
      <table><tr><th>Question</th><th>Blocking</th><th>Default</th></tr>
      ${DATA.questions.map(q=>`<tr><td>${q[0]}</td><td>${q[1]}</td><td>${q[2]}</td></tr>`).join("")}</table>
    </div>
  </div>

  <div class="grid" style="margin-top:14px">
    <div class="card"><h2 style="margin-top:0">Manual steps waiting</h2>
      <table><tr><th>ID</th><th>Step</th><th>Flag</th></tr>
      ${DATA.manual.map(m=>`<tr><td><code>${m[0]}</code></td><td>${m[1]}</td><td>${m[2]}</td></tr>`).join("")}</table>
    </div>
    <div class="card"><h2 style="margin-top:0">Last changed files</h2>
      <ul>${DATA.lastFiles.map(f=>`<li class="mono">${f}</li>`).join("")}</ul>
      <h2>Do-not-touch</h2>
      <ul>${DATA.doNotTouch.map(f=>`<li class="mono">${f}</li>`).join("")}</ul>
    </div>
  </div>

  <div class="card" style="margin-top:14px"><h2 style="margin-top:0">Changelog (recent)</h2>
    <ul>${DATA.changelog.map(c=>`<li>${c}</li>`).join("")}</ul>
  </div>

  <div class="card" style="margin-top:14px"><h2 style="margin-top:0">Next prompt to Claude</h2>
    <textarea rows="3" readonly onclick="this.select()">${DATA.nextPrompt}</textarea>
  </div>
  <div class="sub" style="margin-top:10px">Last updated ${DATA.updated}</div>
`;
</script>
</body>
</html>
